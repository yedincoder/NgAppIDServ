<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>NgAppIDServ - Webserver Local Modern v1.0.2</title>
    <style>
        /* Tema Warna Modern: Dark Grey & Orange */
        :root {
            --bg-dark: #121212;
            --bg-panel: #1E1E1E;
            --text-main: #E0E0E0;
            --text-muted: #888;
            --accent-orange: #F57C00;
            --accent-orange-hover: #FF9800;
            --red-stop: #E53935;
            --green-start: #43A047;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
            text-align: center;
            position: relative;
        }

        h2 {
            margin-top: 0;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--accent-orange);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Layout Kartu / Panel yang Clean */
        .panel {
            background-color: var(--bg-panel);
            padding: 10px 10px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            margin-bottom: 10px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #2A2A2A;
        }
        
        .row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        /* Styling Tombol Standar */
        .btn-toggle {
            padding: 10px 10px;
            font-size: 13px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 130px;
            transition: all 0.2s ease-in-out;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-green { background-color: var(--green-start); color: #fff; }
        .btn-green:hover { background-color: #2E7D32; transform: translateY(-1px); }

        .btn-red { background-color: var(--red-stop); color: #fff; }
        .btn-red:hover { background-color: #C62828; transform: translateY(-1px); }

        /* Styling Lampu Indikator & Teks */
        .lampu-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .lampu {
            width: 12px; height: 12px;
            background-color: #444;
            border-radius: 50%;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .lampu.nyala {
            background-color: var(--green-start);
            box-shadow: 0 0 12px var(--green-start);
        }

        /* Tombol Spesial */
        #btnStopAll {
            background-color: var(--red-stop);
            color: white;
            font-weight: bold;
            border: none;
            padding: 10px;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
            letter-spacing: 1px;
        }
        #btnStopAll:hover { background-color: #B71C1C; }

        .btn-outline {
            background-color: transparent;
            color: var(--accent-orange);
            border: 1px solid var(--accent-orange);
            padding: 10px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-outline:hover {
            background-color: var(--accent-orange);
            color: #121212;
        }

        /* Terminal Log Ala Hacker */
        #statusBox {
            margin-top: 10px;
            padding: 12px;
            background: #0A0A0A;
            color: var(--accent-orange);
            text-align: left;
            overflow-y: auto;
            font-family: 'Consolas', 'Courier New', monospace;
            border-radius: 6px;
            font-size: 12px;
            border: 1px solid #333;
            line-height: 1.5;
        }
        
        /* Modifikasi Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-orange); }

        /* Footer Links */
        .footer-links {
            margin-top: 10px;
            padding-top: 15px;
            border-top: 1px dashed #333;
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .footer-links span {
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.3s;
        }
        .footer-links span:hover {
            color: var(--accent-orange);
            text-decoration: underline;
        }

        /* Pop-up Modal */
        #infoModal {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            align-items: center; justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(3px);
        }
        .modal-content {
            background: var(--bg-panel);
            padding: 10px;
            border-radius: 10px;
            width: 80%;
            max-width: 320px;
            text-align: left;
            border: 1px solid var(--accent-orange);
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
        }
        .modal-content h3 {
            color: var(--accent-orange);
            margin-top: 0;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .modal-body {
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-main);
            margin-bottom: 10px;
        }
    </style>
</head>

        document.getElementById('btnLisensi').addEventListener('click', async () => {
            const hwid = await window.serverAPI.getHWID();
            
            modalTitle.innerText = '👑 Donasi';
            
            modalBody.innerHTML = `
                <div style="margin-bottom:12px; font-size:12px; color:var(--text-muted);">

                <label style="font-size: 11px; font-weight: bold; color: var(--text-main);">Hardware ID (HWID):</label>

                <input type="text" id="licenseField" placeholder="Ketik kode lisensi di sini..." style="width: 100%; padding: 8px; background: #0A0A0A; border: 1px solid #333; color: var(--accent-orange); border-radius: 4px; font-family: monospace; font-size:11px; box-sizing: border-box;">
                
                <button id="btnAktivasiModal" style="margin-top: 15px; width: 100%; background-color: var(--accent-orange); color: #121212; border:none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer;">AKTIVASI SEKARANG</button>
                <div id="statusMsg" style="margin-top: 10px; font-size: 12px; font-weight: bold; text-align: center;"></div>
            `;
            
            modal.style.display = 'flex';

            document.getElementById('btnAktivasiModal').addEventListener('click', () => {
                const license = document.getElementById('licenseField').value;
                const hwidVal = document.getElementById('hwidField').value;
                
                if(!license) {
                    document.getElementById('statusMsg').innerText = "❌ Lisensi tidak boleh kosong!";
                    document.getElementById('statusMsg').style.color = "#E53935";
                    return;
                }

                document.getElementById('statusMsg').innerText = "⏳ Memvalidasi ke server...";
                document.getElementById('statusMsg').style.color = "var(--text-muted)";
                
                window.serverAPI.submitLicense({ hwid: hwidVal, license });
            });
        });

        // --- MENERIMA BALASAN AKTIVASI DARI BACKEND ---
        window.serverAPI.onLicenseResult((event, result) => {
            const msgBox = document.getElementById('statusMsg');
            if(msgBox) {
                if(result.success) {
                    msgBox.style.color = "#43A047"; 
                    msgBox.innerText = "✅ " + result.message;
                    
                    setTimeout(() => { 
                        modal.style.display = 'none'; 
                    }, 2000);
                } else {
                    msgBox.style.color = "#E53935"; 
                    msgBox.innerText = "❌ " + result.message;
                }
            }
        });

       // --- LOGIKA TOMBOL PROJECT ---
document.getElementById('btnOpenProject').addEventListener('click', async () => {
    const projects = await window.serverAPI.getProjects();
    modalTitle.innerText = '📂 Daftar Project Lokal';
    
    let htmlList = '<div style="display:flex; flex-direction:column; gap:8px; max-height: 300px; overflow-y: auto; padding-right: 5px;">';
    
    // Baris Localhost (Diubah jadi flex biar tombol foldernya sejajar)
    htmlList += `
    <div style="display: flex; gap: 5px;">
        <button class="btn-outline" style="text-transform:none; text-align:left; color: var(--accent-orange); border-color: var(--accent-orange); flex-grow: 1;" onclick="window.serverAPI.openExternal('https://localhost.test')">🏠 localhost.test</button>
        <button class="btn-outline" style="width: 40px; padding: 0; border-color: #00BCD4; color: #00BCD4; flex-shrink: 0;" title="Buka Folder Utama (www)" onclick="window.serverAPI.openFolder('')">📁</button>
    </div>`;
    
    if (projects.length === 0) {
        htmlList += '<div style="text-align:center; color: var(--text-muted); margin-top: 15px;">Belum ada folder project di dalam folder <b>www</b>.</div>';
    } else {
        projects.forEach(p => {
            // Tombol project dipecah jadi 3 bagian (Kiri: Buka Web, Tengah: Buka Folder, Kanan: Hapus)
            htmlList += `
            <div style="display: flex; gap: 5px;">
                <button class="btn-outline" style="text-transform:none; text-align:left; color: #fff; border-color: #444; flex-grow: 1;" onclick="window.serverAPI.openExternal('https://${p}.test')">🌐 ${p}.test</button>
                
                <button class="btn-outline" style="width: 40px; padding: 0; border-color: #4CAF50; color: #4CAF50; flex-shrink: 0;" title="Buka Folder ${p}" onclick="window.serverAPI.openFolder('${p}')">📁</button>
                
                <button class="btn-outline" style="width: 40px; padding: 0; border-color: var(--red-stop); color: var(--red-stop); flex-shrink: 0;" title="Hapus Project ${p}" onclick="konfirmasiHapus('${p}')">🗑️</button>
            </div>`;
        });
    }
    
    htmlList += '</div>';
    modalBody.innerHTML = htmlList;
    
    modal.style.display = 'flex';
});

        // --- FUNGSI MODAL KONFIRMASI HAPUS (Tanpa Alert Kaku) ---
        window.konfirmasiHapus = function(namaProject) {
            modalTitle.innerText = '🗑️ Konfirmasi Hapus Project';
            modalBody.innerHTML = `
                <div style="margin-bottom: 20px; font-size: 13px; color: var(--text-main); line-height: 1.5;">
                    Apakah kamu yakin ingin menghapus project <b>${namaProject}</b>?<br><br>
                    <div style="background: #2a1111; padding: 10px; border-radius: 6px; border-left: 3px solid var(--red-stop); margin-top: 10px;">
                        <b style="color: var(--red-stop);">⚠️ PERINGATAN PERMANEN:</b><br>
                        Seluruh file di dalam folder <code>www/${namaProject}</code> akan <b>HANGUS</b> dan tidak bisa dikembalikan!
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button id="btnBatalHapus" class="btn-outline" style="width: 50%; border-color: #888; color: #888;">Batal</button>
                    <button id="btnEksekusiHapus" style="width: 50%; background-color: var(--red-stop); color: white; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer;">🗑️ YA, HAPUS!</button>
                </div>
            `;
            
            // Kalau batal, buka lagi list projectnya
            document.getElementById('btnBatalHapus').addEventListener('click', () => {
                document.getElementById('btnOpenProject').click(); 
            });

            // Eksekusi kirim perintah ke backend
            document.getElementById('btnEksekusiHapus').addEventListener('click', () => {
                modal.style.display = 'none'; 
                window.serverAPI.deleteProject(namaProject); 
            });
        };

        document.getElementById('btnCloseModal').addEventListener('click', () => {
            modal.style.display = 'none';
        });

        // Buka link website ngappid.com di browser utama
        document.getElementById('btnWebsite').addEventListener('click', () => {
            window.serverAPI.openExternal('https://ngappid.com');
        });

        // --- LOGIKA SERVER UTAMA ---
        let state = { web: false, db: false, redis: false, mail: false, ngrok: false };

        document.getElementById('btnTogglePHP').addEventListener('click', () => { 
            const port = document.getElementById('portWeb').value || 80;
            state.web ? window.serverAPI.stop() : window.serverAPI.start(port); 
        });
        
        document.getElementById('btnToggleDB').addEventListener('click', () => { 
            const port = document.getElementById('portDB').value || 3307;
            state.db ? window.serverAPI.stopDB() : window.serverAPI.startDB(port); 
        });
		// --- EKSEKUSI TOMBOL BACKUP ---
		document.getElementById('btnBackupDB').addEventListener('click', () => {
			// Ambil port yang diketik user (default 3307) biar dump-nya presisi
			const port = document.getElementById('portDB').value || 3307;
			window.serverAPI.backupDB(port);
		});
        document.getElementById('btnToggleRedis').addEventListener('click', () => { state.redis ? window.serverAPI.stopRedis() : window.serverAPI.startRedis(); });
        document.getElementById('btnToggleMail').addEventListener('click', () => { state.mail ? window.serverAPI.stopMail() : window.serverAPI.startMail(); });
        // Ubah baris btnToggleNgrok menjadi seperti ini:
        document.getElementById('btnToggleNgrok').addEventListener('click', () => { 
            const domain = document.getElementById('ngrokDomain').value || 'localhost';
            const port = document.getElementById('portWeb').value || 80;
            state.ngrok ? window.serverAPI.stopNgrok() : window.serverAPI.startNgrok({ domain, port }); 
        });
        
        document.getElementById('btnStopAll').addEventListener('click', () => { window.serverAPI.stopAll(); });
        document.getElementById('btnOpenPMA').addEventListener('click', () => window.serverAPI.openPMA());

        function ubahTombol(idTombol, isRunning, namaLayanan) {
            const btn = document.getElementById(idTombol);
            if (isRunning) {
                btn.textContent = 'Stop ' + namaLayanan;
                btn.className = 'btn-toggle btn-red';
            } else {
                btn.textContent = 'Start ' + namaLayanan;
                btn.className = 'btn-toggle btn-green';
            }
        }

        window.serverAPI.onStatus((event, data) => {
            const lampu = document.getElementById(data.id);
            const isRunning = (data.status === 'on');

            if (lampu) {
                isRunning ? lampu.classList.add('nyala') : lampu.classList.remove('nyala');

                if (data.id === 'lampuWeb') { state.web = isRunning; ubahTombol('btnTogglePHP', isRunning, 'PHP'); } 
                else if (data.id === 'lampuDB') { state.db = isRunning; ubahTombol('btnToggleDB', isRunning, 'MySQL'); } 
                else if (data.id === 'lampuRedis') { state.redis = isRunning; ubahTombol('btnToggleRedis', isRunning, 'Redis'); } 
                else if (data.id === 'lampuMail') { state.mail = isRunning; ubahTombol('btnToggleMail', isRunning, 'Mail'); } 
                else if (data.id === 'lampuNgrok') { 
                    state.ngrok = isRunning; 
                    const btn = document.getElementById('btnToggleNgrok');
                    isRunning ? (btn.textContent = 'Stop Ngrok', btn.className = 'btn-toggle btn-red') 
                              : (btn.textContent = 'Start Ngrok', btn.className = 'btn-toggle btn-green');
                }
            }
        });

        window.serverAPI.onLog((event, message) => {
            const box = document.getElementById('statusBox');
            box.innerHTML += `<br>><span style="color:#aaa;"> ${message}</span>`;
            box.scrollTop = box.scrollHeight;
        });

        window.serverAPI.onNgrokUrl((event, url) => {
            const container = document.getElementById('ngrokResult');
            const btnLink = document.getElementById('btnNgrokLink');
            
            if (url) {
                container.style.display = 'block';
                btnLink.onclick = () => window.serverAPI.openExternal(url); 
            } else {
                container.style.display = 'none';
            }
        });
        
       // --- LOGIKA TOMBOL AUTO INSTALLER ---
        document.getElementById('btnInstaller').addEventListener('click', () => {
            modalTitle.innerText = '📦 Auto Installer App';
            
            modalBody.innerHTML = `
                <div style="margin-bottom: 15px; font-size: 12px; color: var(--text-muted); line-height: 1.5;">
                    Pilih platform yang ingin diunduh dan diinstal otomatis ke dalam folder <b>www</b> Anda:
                </div>
                
                <b style="color: var(--accent-orange); font-size: 12px;">🔥 PHP Frameworks</b>
                <div style="display:flex; gap:8px; margin: 8px 0 15px 0;">
                    <button class="btn-outline btn-install-app" data-app="laravel" style="width: 50%; border-color: #F44336; color: #F44336; font-size: 11px;">Laravel 11</button>
                    <button class="btn-outline btn-install-app" data-app="ci4" style="width: 50%; border-color: #E65100; color: #E65100; font-size: 11px;">CodeIgniter 4</button>
                </div>

                <b style="color: var(--accent-orange); font-size: 12px;">🌍 Content Management System (CMS)</b>
                <div style="display:flex; gap:8px; margin: 8px 0;">
                    <button class="btn-outline btn-install-app" data-app="wordpress" style="width: 50%; border-color: #2196F3; color: #2196F3; font-size: 11px;">WordPress</button>
                    <button class="btn-outline btn-install-app" data-app="joomla" style="width: 50%; border-color: #4CAF50; color: #4CAF50; font-size: 11px;">Joomla!</button>
                </div>
            `;
            
            modal.style.display = 'flex';

            // Logika ketika salah satu tombol App (misal WordPress) diklik
            document.querySelectorAll('.btn-install-app').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const appName = e.target.getAttribute('data-app');
                    
                    // Ubah isi Modal menjadi Form Input Nama Project
                    modalTitle.innerText = `⚙️ Setup Project ${appName.toUpperCase()}`;
                    modalBody.innerHTML = `
                        <div style="margin-bottom: 15px; font-size: 13px; color: var(--text-main);">
                            Masukkan nama folder untuk project <b>${appName.toUpperCase()}</b> kamu.<br>
                            <i style="font-size: 11px; color: var(--text-muted);">(Nama ini akan otomatis menjadi domain, misal: tokoku.test)</i>
                        </div>
                        
                        <input type="text" id="inputProjectName" placeholder="Contoh: tokoku" style="width: 100%; padding: 10px; background: #0A0A0A; border: 1px solid #333; color: var(--accent-orange); border-radius: 4px; font-family: monospace; box-sizing: border-box; margin-bottom: 15px; outline: none;">
                        
                        <button id="btnEksekusiInstall" style="width: 100%; background-color: var(--green-start); color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s;">🚀 INSTALL SEKARANG</button>
                    `;

                    // Eksekusi ketika tombol Install Sekarang diklik
                    document.getElementById('btnEksekusiInstall').addEventListener('click', () => {
                        let projectName = document.getElementById('inputProjectName').value.trim();
                        // Bersihkan spasi dan karakter aneh biar aman buat nama folder
                        projectName = projectName.replace(/[^a-zA-Z0-9_-]/g, '').toLowerCase();
                        
                        if (!projectName) {
                            document.getElementById('inputProjectName').style.borderColor = "red";
                            return;
                        }
                        
                        modal.style.display = 'none'; // Tutup modal
                        
                        // Kirim Data App dan Nama Project ke Backend
                        window.serverAPI.installApp({ appName, projectName }); 
                    });
                });
            });
        });
    </script>
</body>
